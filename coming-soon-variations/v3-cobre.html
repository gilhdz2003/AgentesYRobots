<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentes&Robots — Próximamente</title>
  <meta name="description" content="Infraestructura de IA empresarial. Diseñamos y desplegamos soluciones de automatización con inteligencia artificial.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0C0C0C;
      --bg-elevated: #121110;
      --accent: #C87941;
      --accent-soft: rgba(200, 121, 65, 0.08);
      --accent-glow: rgba(200, 121, 65, 0.1);
      --accent-muted: rgba(200, 121, 65, 0.3);
      --accent-bright: #D98E55;
      --surface: #151311;
      --border: #1E1C1A;
      --text: #E8E0D8;
      --text-secondary: #A09888;
      --text-muted: #6B6058;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    ::selection { background: var(--accent); color: var(--bg); }

    .page-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .page-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 55% at 50% 55%, var(--accent-glow), transparent 65%),
        radial-gradient(ellipse 30% 25% at 75% 25%, rgba(200, 121, 65, 0.04), transparent);
    }

    .page-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(200, 121, 65, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200, 121, 65, 0.02) 1px, transparent 1px);
      background-size: 70px 70px;
      mask-image: radial-gradient(ellipse 50% 50% at center, black 10%, transparent 60%);
      -webkit-mask-image: radial-gradient(ellipse 50% 50% at center, black 10%, transparent 60%);
    }

    .scan-line {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 10%, var(--accent), transparent 90%);
      opacity: 0;
      z-index: 1;
      animation: scanDown 4s ease-in-out 0.6s 1 forwards;
    }

    @keyframes scanDown {
      0% { top: -2px; opacity: 0; }
      5% { opacity: 0.35; }
      95% { opacity: 0.03; }
      100% { top: 100%; opacity: 0; }
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem clamp(1.5rem, 4vw, 3rem);
    }

    .ghost-amp {
      position: absolute;
      top: 48%;
      left: 52%;
      transform: translate(-50%, -55%);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(12rem, 28vw, 20rem);
      color: var(--accent);
      opacity: 0.02;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    .logo-wrap {
      position: relative;
      margin-bottom: clamp(2rem, 4vh, 3.5rem);
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 9vw, 6.5rem);
      letter-spacing: -0.04em;
      line-height: 1;
      opacity: 0;
      animation: fadeUp 0.7s ease-out 0.4s forwards;
    }

    .logo .amp {
      color: var(--accent);
      display: inline-block;
      text-shadow: 0 0 25px var(--accent-muted);
      animation: glowPulse 4.5s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 25px var(--accent-muted); }
      50% { text-shadow: 0 0 55px rgba(200, 121, 65, 0.4), 0 0 90px rgba(200, 121, 65, 0.12); }
    }

    .sep {
      width: 72px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin-bottom: clamp(1.5rem, 3vh, 2.5rem);
      opacity: 0;
      animation: fadeUp 0.6s ease-out 0.7s forwards;
    }

    .tagline {
      font-weight: 300;
      font-size: clamp(0.65rem, 1.3vw, 0.8rem);
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: var(--text-muted);
      margin-bottom: clamp(1.5rem, 3vh, 2rem);
      opacity: 0;
      animation: fadeUp 0.6s ease-out 0.9s forwards;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: clamp(2.5rem, 5vh, 3.5rem);
      opacity: 0;
      animation: fadeUp 0.5s ease-out 1.1s forwards;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotPulse 3s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200, 121, 65, 0.45); }
      50% { box-shadow: 0 0 0 8px rgba(200, 121, 65, 0); }
    }

    .email-section {
      max-width: 400px;
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.5s ease-out 1.3s forwards;
    }

    .email-label {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 0.85rem;
      line-height: 1.55;
    }

    .email-form {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .email-form:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .email-input {
      flex: 1;
      padding: 13px 16px;
      background: var(--surface);
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
    }

    .email-input::placeholder { color: var(--text-muted); }

    .email-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 13px 22px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      cursor: pointer;
      transition: filter 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .email-btn:hover {
      filter: brightness(1.15);
      box-shadow: 0 4px 20px var(--accent-muted);
    }

    .success {
      display: none;
      padding: 14px;
      background: var(--surface);
      border: 1px solid rgba(200, 121, 65, 0.15);
      border-radius: 4px;
      color: var(--accent-bright);
      font-size: 0.85rem;
      text-align: center;
    }

    .success.show { display: block; animation: fadeUp 0.35s ease-out; }

    footer {
      position: relative;
      z-index: 1;
      padding: 1.5rem 2rem;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 0.75rem;
    }

    .footer-links a {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--accent); }
    .copy { font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.04em; }

    .variant-tag {
      position: fixed;
      bottom: 0.75rem;
      right: 0.75rem;
      z-index: 10;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 5px 10px;
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .email-form { flex-direction: column; }
      .email-btn { padding: 14px; }
      .ghost-amp { font-size: 8rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>
  <div class="scan-line"></div>
  <div class="variant-tag">Cobre</div>

  <main>
    <div class="ghost-amp">&</div>
    <div class="logo-wrap">
      <div class="logo">AGENTES<span class="amp">&</span>ROBOTS</div>
    </div>
    <div class="sep"></div>
    <p class="tagline">Infraestructura de IA Empresarial</p>
    <div class="status"><span class="dot"></span>Próximamente</div>
    <div class="email-section">
      <p class="email-label">Sé el primero en saber cuándo lancemos. Deja tu correo.</p>
      <form class="email-form" id="form">
        <input type="email" class="email-input" placeholder="tu@correo.com" required name="email" autocomplete="email">
        <button type="submit" class="email-btn">Suscribir</button>
      </form>
      <div class="success" id="ok">Gracias. Te avisaremos cuando lancemos.</div>
    </div>
  </main>

  <footer>
    <div class="footer-links">
      <a href="https://linkedin.com/company/agentesyrobots" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://github.com/agentesyrobots" target="_blank" rel="noopener">GitHub</a>
    </div>
    <p class="copy">&copy; 2026 Agentes&Robots. Todos los derechos reservados.</p>
  </footer>

  <script>
    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const f = e.target, btn = f.querySelector('.email-btn'), email = f.email.value;
      btn.textContent = '...'; btn.disabled = true;
      try {
        await fetch('https://formsubmit.co/ajax/hola@agentesyrobots.com', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ email, _subject: 'Suscriptor Agentes&Robots' })
        });
      } catch(_) {}
      f.style.display = 'none';
      document.getElementById('ok').classList.add('show');
    });
  </script>
</body>
</html>
